<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Read-Only Anatomy Display</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --blue: #2d5aeb;
      --text: #3b3527;
      --title: #2f2a1e;
      --muscle-base: brightness(0.72) sepia(1) hue-rotate(170deg) saturate(1.35);
      --muscle-hover: brightness(0.95) sepia(1) hue-rotate(340deg) saturate(5.2) contrast(1.05);
      --muscle-selected: brightness(1.03) sepia(1) hue-rotate(350deg) saturate(7.8) contrast(1.08);
      --muscle-selected-hover: brightness(1.12) sepia(1) hue-rotate(355deg) saturate(8.4) contrast(1.1);
      --tooltip-bg: rgba(20, 19, 14, 0.92);
      --tooltip-text: #f3ebdc;
      --tooltip-border: #51442a;
    }
    :root[data-theme="dark"] {
      --bg: #0f0f0b;
      --blue: #f0a830;
      --text: #b6ae9b;
      --title: #f3ebdc;
      --muscle-base: brightness(0.48) sepia(0.9) hue-rotate(175deg) saturate(1.35);
      --muscle-hover: brightness(0.85) sepia(1) hue-rotate(340deg) saturate(4.6) contrast(1.04);
      --muscle-selected: brightness(1.1) sepia(1) hue-rotate(350deg) saturate(8.4) contrast(1.12);
      --muscle-selected-hover: brightness(1.2) sepia(1) hue-rotate(355deg) saturate(9.2) contrast(1.12);
      --tooltip-bg: rgba(8,10,16,0.92);
      --tooltip-text: #e0e8f5;
      --tooltip-border: #3a4560;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: auto;
      padding: 12px;
      transition: background-color .25s ease, color .25s ease;
      gap: 10px;
      overflow: hidden;
    }
    .svg-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      cursor: default;
      pointer-events: none;
    }
    svg { 
      width: 100%; 
      height: 100%; 
      display: block; 
    }
    .muscle-layer {
      filter: var(--muscle-base);
      transition: filter 0.15s ease;
    }
    .muscle-layer.selected {
      filter: var(--muscle-selected);
    }
    #tooltip {
      display: none;
    }
  </style>
</head>

<script>
const LAYERS = [
  { id: 'front-shoulders', x: 0, y: 0, w: 200, h: 200, name: 'Delts' },
  { id: 'front-forearms', x: 0, y: 0, w: 200, h: 200, name: 'Forearms' },
  { id: 'front-biceps', x: 0, y: 0, w: 200, h: 200, name: 'Biceps' },
  { id: 'front-neck', x: 0, y: 0, w: 200, h: 200, name: 'Neck' },
  { id: 'front-chest', x: 0, y: 0, w: 200, h: 200, name: 'Chest' },
  { id: 'front-abs', x: 0, y: 0, w: 200, h: 200, name: 'Abs' },
  { id: 'front-obliques', x: 0, y: 0, w: 200, h: 200, name: 'Obliques' },
  { id: 'front-quadriceps', x: 0, y: 0, w: 200, h: 200, name: 'Quadriceps' },
  { id: 'front-calves', x: 0, y: 0, w: 200, h: 200, name: 'Calves' },
  { id: 'back-lats', x: 0, y: 0, w: 200, h: 200, name: 'Lats' },
  { id: 'back-traps', x: 0, y: 0, w: 200, h: 200, name: 'Traps' },
  { id: 'back-triceps', x: 0, y: 0, w: 200, h: 200, name: 'Triceps' },
  { id: 'back-forearms', x: 0, y: 0, w: 200, h: 200, name: 'Forearms' },
  { id: 'back-glutes', x: 0, y: 0, w: 200, h: 200, name: 'Glutes' },
  { id: 'back-hamstrings', x: 0, y: 0, w: 200, h: 200, name: 'Hamstrings' },
  { id: 'back-delts', x: 0, y: 0, w: 200, h: 200, name: 'Delts' },
  { id: 'front-delts', x: 0, y: 0, w: 200, h: 200, name: 'Delts' },
  { id: 'front-hamstrings', x: 0, y: 0, w: 200, h: 200, name: 'Hamstrings' },
  { id: 'front-glutes', x: 0, y: 0, w: 200, h: 200, name: 'Glutes' },
  { id: 'back-calves', x: 0, y: 0, w: 200, h: 200, name: 'Calves' }
];

const SVG_W = 350;
const SVG_H = 650;

const wrapper = document.getElementById('svg-wrapper');
const tooltip = document.getElementById('tooltip');
const selected = new Set();
let canvases = {};
let svgEl = null;

// Create SVG structure
function createSVG() {
  svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svgEl.setAttribute('viewBox', '0 0 ' + SVG_W + ' ' + SVG_H);
  svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  
  LAYERS.forEach(layer => {
    const image = document.createElementNS('http://www.w3.org/2000/svg', 'image');
    image.setAttribute('data-name', layer.name);
    image.setAttribute('x', layer.x);
    image.setAttribute('y', layer.y);
    image.setAttribute('width', layer.w);
    image.setAttribute('height', layer.h);
    image.setAttribute('href', 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==');
    image.classList.add('muscle-layer');
    
    svgEl.appendChild(image);
  });
  
  wrapper.appendChild(svgEl);
}

/**
 * Main function: displaySelectedMuscles
 * Accepts an array of muscle names (strings) or a JSON string
 * Marks those muscles as selected in the read-only view
 * 
 * @param {Array<string> | string} musclesData - Array of muscle names or JSON string
 */
function displaySelectedMuscles(musclesData) {
  // Parse if JSON string
  let muscles = [];
  
  if (typeof musclesData === 'string') {
    try {
      muscles = JSON.parse(musclesData);
    } catch (e) {
      console.error('Invalid JSON for muscles:', e);
      return;
    }
  } else if (Array.isArray(musclesData)) {
    muscles = musclesData;
  } else {
    console.error('muscles parameter must be an array or JSON string');
    return;
  }
  
  // Clear previous selections
  selected.clear();
  document.querySelectorAll('.muscle-layer.selected').forEach(el => {
    el.classList.remove('selected');
  });
  
  // Apply selections
  muscles.forEach(muscleName => {
    if (typeof muscleName === 'string') {
      const cleanName = muscleName.trim();
      if (cleanName) {
        selected.add(cleanName);
        document.querySelectorAll('[data-name="' + cleanName + '"]').forEach(el => {
          el.classList.add('selected');
        });
      }
    }
  });
}

// Listen for messages from parent (like the info modal)
window.addEventListener('message', function(event) {
  if (event.data.type === 'foovia-muscles') {
    displaySelectedMuscles(event.data.muscles);
  }
});

// Initialize
createSVG();
buildCanvases();

function buildCanvases() {
  LAYERS.forEach(layer => {
    const img = document.getElementById('img-' + layer.id);
    const canvas = document.createElement('canvas');
    canvas.width = layer.w;
    canvas.height = layer.h;
    const ctx = canvas.getContext('2d');
    try {
      ctx.drawImage(img, 0, 0, layer.w, layer.h);
      canvases[layer.id] = { canvas, ctx, layer };
    } catch(e) {
      console.warn('Canvas error for', layer.id, e);
    }
  });
}

// Wait for images to load
let loaded = 0;
const total = LAYERS.length;
LAYERS.forEach(layer => {
  const img = document.getElementById('img-' + layer.id);
  const done = () => { loaded++; if (loaded === total) buildCanvases(); };
  if (img.complete) done();
  else img.addEventListener('load', done);
});
</script>
